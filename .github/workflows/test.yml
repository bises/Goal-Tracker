name: SSH Debug

on:
    workflow_dispatch:

jobs:
    ssh-debug:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Write SSH key to temp file
              run: |
                  # Write the secret to a temp file
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/id_rsa
                  chmod 600 /tmp/id_rsa

                  # Check the first few lines to verify formatting (GitHub masks secrets)
                  head -n 5 /tmp/id_rsa

            - name: Test SSH connection with verbose logging
              run: |
                  ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no -vvv ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo '🔑 SSH works!'"
